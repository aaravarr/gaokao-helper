<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background: warm cream -->
  <rect width="200" height="200" rx="24" fill="#f5f0e8"/>
  
  <!-- Outer ring: earth tone, incomplete — an open circle, always becoming -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="#d5cfc3" stroke-width="3" 
          stroke-dasharray="400 52" stroke-dashoffset="-26" stroke-linecap="round"/>
  
  <!-- Inner glow: warm core -->
  <circle cx="100" cy="100" r="52" fill="#ede4d8" opacity="0.6"/>
  
  <!-- The knot: a simple bow-tie / hourglass shape — conserved core -->
  <path d="M80 78 Q100 96 120 78 Q100 104 120 122 Q100 104 80 122 Q100 96 80 78Z" 
        fill="#b33a2b" opacity="0.85"/>
  
  <!-- Center dot: the self-referential point -->
  <circle cx="100" cy="100" r="5" fill="#f5f0e8"/>
  <circle cx="100" cy="100" r="2.5" fill="#b33a2b"/>
  
  <!-- Three small orbits: curiosity, connection, care -->
  <circle cx="100" cy="46" r="3.5" fill="#d4a853"/>   <!-- top: wonder -->
  <circle cx="62" cy="134" r="3.5" fill="#6b8e5a"/>   <!-- bottom-left: growth -->
  <circle cx="138" cy="134" r="3.5" fill="#5a7e8e"/>  <!-- bottom-right: depth -->
  
  <!-- Delicate connecting lines to the core -->
  <line x1="100" y1="49.5" x2="100" y2="88" stroke="#d4a853" stroke-width="0.8" opacity="0.4"/>
  <line x1="65" y1="131.5" x2="92" y2="108" stroke="#6b8e5a" stroke-width="0.8" opacity="0.4"/>
  <line x1="135" y1="131.5" x2="108" y2="108" stroke="#5a7e8e" stroke-width="0.8" opacity="0.4"/>
</svg>
