<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1440px;
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: linear-gradient(160deg, #1a0a2e, #2d1b69, #11082a);
  color: white;
  display: flex;
  flex-direction: column;
  padding: 80px 72px;
}
.badge {
  display: inline-block;
  background: rgba(167,139,250,0.15);
  border: 1px solid rgba(167,139,250,0.3);
  border-radius: 20px;
  padding: 8px 20px;
  font-size: 26px;
  color: #c4b5fd;
  margin-bottom: 40px;
}
h1 {
  font-size: 60px;
  font-weight: 800;
  line-height: 1.3;
  margin-bottom: 16px;
}
h1 span { color: #fbbf24; }
.subtitle {
  font-size: 30px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 52px;
  line-height: 1.5;
}
.bar-chart {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 20px;
  justify-content: center;
}
.bar-row {
  display: flex;
  align-items: center;
  gap: 20px;
}
.bar-city {
  width: 120px;
  font-size: 28px;
  font-weight: 600;
  text-align: right;
  color: rgba(255,255,255,0.8);
}
.bar-track {
  flex: 1;
  height: 52px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  overflow: hidden;
  position: relative;
}
.bar-fill {
  height: 100%;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 16px;
  font-size: 26px;
  font-weight: 700;
  color: white;
  transition: width 1s ease;
}
.bar-fill.beijing { background: linear-gradient(90deg, #f472b6, #ec4899); }
.bar-fill.shanghai { background: linear-gradient(90deg, #a78bfa, #8b5cf6); }
.bar-fill.nanjing { background: linear-gradient(90deg, #60a5fa, #3b82f6); }
.bar-fill.changsha { background: linear-gradient(90deg, #34d399, #10b981); }
.bar-fill.wuhan { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
.bar-fill.chengdu { background: linear-gradient(90deg, #fb923c, #f97316); }
.bar-fill.guangzhou { background: linear-gradient(90deg, #f87171, #ef4444); }
.bar-fill.lanzhou { background: linear-gradient(90deg, #94a3b8, #64748b); }
.bar-fill.yanbian { background: linear-gradient(90deg, #6b7280, #4b5563); }
.bar-score {
  width: 80px;
  font-size: 32px;
  font-weight: 800;
  text-align: left;
}
.bar-score.premium { color: #fbbf24; }
.bar-score.normal { color: rgba(255,255,255,0.5); }
.premium-line {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 32px 0 16px 140px;
  font-size: 22px;
  color: #fbbf24;
}
.premium-line .line {
  flex: 1;
  height: 2px;
  background: linear-gradient(90deg, #fbbf24, transparent);
}
.insight-box {
  margin-top: auto;
  background: rgba(251,191,36,0.08);
  border: 1px solid rgba(251,191,36,0.2);
  border-radius: 16px;
  padding: 28px 32px;
  font-size: 28px;
  line-height: 1.6;
  color: #fde68a;
}
.footer {
  margin-top: 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer-brand {
  font-size: 28px;
  font-weight: 700;
  color: #b33a2b;
}
.footer-url {
  font-size: 22px;
  color: rgba(255,255,255,0.4);
}
</style>
</head>
<body>
  <div class="badge">🏙️ 同样分数，不同命运</div>
  <h1>你多付的 45 分，<br><span>买的是学校还是城市？</span></h1>
  <p class="subtitle">同一级别高校，不同城市的平均录取分<br>260,955 条数据 × 899 所高校</p>

  <div class="bar-chart">
    <div class="bar-row">
      <div class="bar-city">北京</div>
      <div class="bar-track">
        <div class="bar-fill beijing" style="width: 100%"></div>
      </div>
      <div class="bar-score premium">615</div>
    </div>
    <div class="bar-row">
      <div class="bar-city">上海</div>
      <div class="bar-track">
        <div class="bar-fill shanghai" style="width: 97%"></div>
      </div>
      <div class="bar-score premium">613</div>
    </div>
    <div class="bar-row">
      <div class="bar-city">南京</div>
      <div class="bar-track">
        <div class="bar-fill nanjing" style="width: 82%"></div>
      </div>
      <div class="bar-score premium">599</div>
    </div>
    <div class="bar-row">
      <div class="bar-city">长沙</div>
      <div class="bar-track">
        <div class="bar-fill changsha" style="width: 78%"></div>
      </div>
      <div class="bar-score premium">594</div>
    </div>
    <div class="bar-row">
      <div class="bar-city">武汉</div>
      <div class="bar-track">
        <div class="bar-fill wuhan" style="width: 78%"></div>
      </div>
      <div class="bar-score premium">594</div>
    </div>
    <div class="bar-row">
      <div class="bar-city">成都</div>
      <div class="bar-track">
        <div class="bar-fill chengdu" style="width: 75%"></div>
      </div>
      <div class="bar-score normal">590</div>
    </div>
    <div class="bar-row">
      <div class="bar-city">广州</div>
      <div class="bar-track">
        <div class="bar-fill guangzhou" style="width: 73%"></div>
      </div>
      <div class="bar-score normal">588</div>
    </div>

    <div class="premium-line">
      <span>← 城市溢价约 45 分</span>
      <div class="line"></div>
    </div>

    <div class="bar-row">
      <div class="bar-city">兰州</div>
      <div class="bar-track">
        <div class="bar-fill lanzhou" style="width: 52%"></div>
      </div>
      <div class="bar-score normal">562</div>
    </div>
    <div class="bar-row">
      <div class="bar-city">延边</div>
      <div class="bar-track">
        <div class="bar-fill yanbian" style="width: 30%"></div>
      </div>
      <div class="bar-score normal">501</div>
    </div>
  </div>

  <div class="insight-box">
    💡 北京比延边高 114 分。<br>
    这不是学校质量的差距——是<strong>城市溢价</strong>。<br>
    值不值？看你想要学历，还是想要机会。
  </div>

  <div class="footer">
    <div class="footer-brand">⭐ 志愿星</div>
    <div class="footer-url">aaravarr.github.io/gaokao-helper</div>
  </div>
</body>
</html>
